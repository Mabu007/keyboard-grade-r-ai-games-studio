# fly.toml app configuration file generated for grade-r-games-studio
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "grade-r-games-studio" # CHANGE THIS TO YOUR UNIQUE APP NAME
primary_region = "hkg" 

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
